<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMAP shopping centre</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="./style.css">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body class="text-[var(--primary-foreground)] bg-[var(--primary)]">
  <div class="bg-[var(--primary)]">
    <main>
      <!-- Header -->
      <div class="fixed left-0 right-0 top-0">
        <div
          class="flex flex-col items-center justify-center h-full bg-[var(--secondary)] p-4 rounded-b-3xl border-b border-[var(--primary)]"
          id="header">
          <div class="flex items-center justify-between w-full">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-0">
              <path d="M4 5h16" />
              <path d="M4 12h16" />
              <path d="M4 19h16" />
            </svg>
            <h1 class="text-4xl instrument-serif-regular">AMAP</h1>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-menu-icon lucide-menu">
              <path d="M4 5h16" />
              <path d="M4 12h16" />
              <path d="M4 19h16" />
            </svg>
          </div>
          <!-- Menu -->
          <div id="menu"
            class="instrument-serif-regular font-medium text-2xl flex flex-col items-center gap-4 mt-8 hidden">
            <a href="#">Stores</a>
            <a href="#map">Map</a>
          </div>
        </div>
      </div>
      <!-- Store -->
      <div class="p-4 mt-[72px]">
        <h2 class="instrument-serif-regular mb-4 text-3xl">Stores</h2>
        <!-- Search -->
         <div>
          <input type="text" id="search" placeholder="Search stores..."
            class="w-full p-2 rounded-lg bg-[var(--secondary)] mb-4"
            oninput="searchStores(this.value)">
         </div>
         <div id="results" class="mb-4">
            <!-- Search results -->
         </div>
        <!-- Category -->
        <div>
          <h3 class="instrument-serif-regular mb-2 text-2xl">Browse by Category</h3>
        </div>
        <div class="grid grid-cols-2 instrument-serif-regular">
          <div
            class="bg-[var(--secondary)] p-4 text-center flex flex-col items-center justify-center gap-2 rounded-tl-3xl"
            id="fashion-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-shirt-icon lucide-shirt">
              <path
                d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z" />
            </svg>
            Fashion
          </div>
          <div
            class="bg-[var(--secondary)] p-4 text-center flex flex-col items-center justify-center gap-2 rounded-tr-3xl"
            id="electronics-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-laptop-icon lucide-laptop">
              <path
                d="M18 5a2 2 0 0 1 2 2v8.526a2 2 0 0 0 .212.897l1.068 2.127a1 1 0 0 1-.9 1.45H3.62a1 1 0 0 1-.9-1.45l1.068-2.127A2 2 0 0 0 4 15.526V7a2 2 0 0 1 2-2z" />
              <path d="M20.054 15.987H3.946" />
            </svg>
            Electronics
          </div>
          <div
            class="bg-[var(--secondary)] p-4 text-center flex flex-col items-center justify-center gap-2 rounded-bl-3xl"
            id="eat-drink-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-utensils-icon lucide-utensils">
              <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2" />
              <path d="M7 2v20" />
              <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" />
            </svg>
            Eat & Drink
          </div>
          <div
            class="bg-[var(--secondary)] p-4 text-center flex flex-col items-center justify-center gap-2 rounded-br-3xl"
            id="parking-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-circle-parking-icon lucide-circle-parking">
              <circle cx="12" cy="12" r="10" />
              <path d="M9 17V7h4a3 3 0 0 1 0 6H9" />
            </svg>
            Parking
          </div>
        </div>
        <div id="store-list" class="instrument-sans-regular mt-8 space-y-8">
          <div id="store" class="flex items-center justify-center h-8">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e9/TK_Maxx_Logo.svg" alt="TK Maxx Logo"
              class="h-full">
            <p class="ml-4">Tk Maxx</p>
          </div>
          <div id="store" class="flex items-center justify-center h-8">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/H%26M-Logo.svg" alt="H&M Logo" class="h-full">
            <p class="ml-4">H&M</p>
          </div>
          <div id="store" class="flex items-center justify-center h-8">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/79/M%26S_logo.svg" alt="Mark & Spencer Logo"
              class="h-full">
            <p class="ml-4">Mark & Spencer</p>
          </div>
          <div id="store" class="flex items-center justify-center h-8">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg" alt="Nike Logo" class="h-full">
            <p class="ml-4">Nike</p>
          </div>
        </div>
      </div>
      <div class="p-4 rounded-3xl">
        <div id="map"></div>
      </div>
      <div>
        <p class="text-left instrument-serif-regular px-4 pt-4 text-2xl pb-12">&copy; 2026 AMAP. All rights reserved. </p>
      </div>
    </main>
  </div>
  <div class="fixed bottom-8 right-8 bg-[var(--secondary)] p-4 rounded-xl cursor-pointer z-[9999]" id="info-btn">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-info-icon lucide-info">
      <circle cx="12" cy="12" r="10" />
      <path d="M12 16v-4" />
      <path d="M12 8h.01" />
    </svg>
    <div id="popup"
      class="absolute bottom-full right-0 mb-2 w-64 p-4 bg-[var(--primary)] text-[var(--primary-foreground)] rounded-lg shadow-lg hidden flex flex-col">
      <div>
        <input type="checkbox" id="text-btn">
        <label for="text-btn">Bigger Text</label>
      </div>
      <div>
        <input type="checkbox" id="tts-btn">
        <label for="tts-btn">Text to Speech</label>
      </div>
    </div>
  </div>
  <script src="./script.js"></script>
</body>

</html>
